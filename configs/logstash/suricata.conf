# =============================================================================
# Pipeline Logstash — Suricata EVE JSON vers Elasticsearch
# Auteur : axo9cyber
# Description : Ingestion, parsing et enrichissement des alertes Suricata
# =============================================================================

# -----------------------------------------------------------------------------
# INPUT — Lecture du fichier EVE JSON de Suricata
# -----------------------------------------------------------------------------
input {
  file {
    path => "/var/log/suricata/eve.json"
    codec => json
    type => "SuricataIDPS"
    # Lire depuis le début du fichier au démarrage
    start_position => "beginning"
    sincedb_path => "/var/lib/logstash/sincedb_suricata"
    # Surveiller les rotations de fichiers
    file_completed_action => "log"
  }

  # Alternative : Filebeat → Logstash (port Beats)
  beats {
    port => 5044
    ssl => false
  }
}

# -----------------------------------------------------------------------------
# FILTER — Traitement et enrichissement
# -----------------------------------------------------------------------------
filter {

  # -------------------------
  # Traitement de base JSON
  # -------------------------
  if [type] == "SuricataIDPS" {

    # Vérification que le JSON est bien formé
    if ![event_type] {
      drop { }
    }

    # Conversion du timestamp Suricata vers format Logstash
    date {
      match => [ "timestamp", "ISO8601" ]
      target => "@timestamp"
    }

    # Renommage du champ source pour compatibilité ECS
    if [src_ip] {
      mutate {
        rename => {
          "src_ip"   => "[source][ip]"
          "src_port" => "[source][port]"
          "dest_ip"  => "[destination][ip]"
          "dest_port" => "[destination][port]"
        }
        add_field => { "[@metadata][index]" => "suricata-alerts" }
      }
    }

    # -------------------------
    # Enrichissement GeoIP
    # -------------------------
    if [source][ip] and [source][ip] !~ "^(10\.|172\.(1[6-9]|2[0-9]|3[01])\.|192\.168\.)" {
      geoip {
        source => "[source][ip]"
        target => "[source][geo]"
        add_field => { "[source][geo][available]" => "true" }
      }
    }

    if [destination][ip] and [destination][ip] !~ "^(10\.|172\.(1[6-9]|2[0-9]|3[01])\.|192\.168\.)" {
      geoip {
        source => "[destination][ip]"
        target => "[destination][geo]"
      }
    }

    # -------------------------
    # Traitement des alertes
    # -------------------------
    if [event_type] == "alert" {

      mutate {
        add_field => {
          "[event][kind]"     => "alert"
          "[event][category]" => "intrusion_detection"
          "[event][module]"   => "suricata"
          "[event][dataset]"  => "suricata.alert"
        }
      }

      # Mapping de la sévérité Suricata vers niveau lisible
      if [alert][severity] {
        if [alert][severity] == 1 {
          mutate { add_field => { "[alert][severity_label]" => "High" } }
        } else if [alert][severity] == 2 {
          mutate { add_field => { "[alert][severity_label]" => "Medium" } }
        } else if [alert][severity] == 3 {
          mutate { add_field => { "[alert][severity_label]" => "Low" } }
        }
      }

      # Extraction de la catégorie d'attaque depuis le message
      if [alert][category] {
        mutate {
          add_field => { "[threat][category]" => "%{[alert][category]}" }
        }
      }
    }

    # -------------------------
    # Traitement des flux HTTP
    # -------------------------
    if [event_type] == "http" {
      mutate {
        add_field => {
          "[event][kind]"    => "event"
          "[event][module]"  => "suricata"
          "[event][dataset]" => "suricata.http"
          "[network][protocol]" => "http"
        }
      }
    }

    # -------------------------
    # Traitement des flux DNS
    # -------------------------
    if [event_type] == "dns" {
      mutate {
        add_field => {
          "[event][kind]"    => "event"
          "[event][module]"  => "suricata"
          "[event][dataset]" => "suricata.dns"
          "[network][protocol]" => "dns"
        }
      }
    }

    # -------------------------
    # Traitement des flux SSH
    # -------------------------
    if [event_type] == "ssh" {
      mutate {
        add_field => {
          "[event][kind]"    => "event"
          "[event][module]"  => "suricata"
          "[event][dataset]" => "suricata.ssh"
          "[network][protocol]" => "ssh"
        }
      }
    }

    # -------------------------
    # Traitement TLS
    # -------------------------
    if [event_type] == "tls" {
      mutate {
        add_field => {
          "[event][kind]"    => "event"
          "[event][module]"  => "suricata"
          "[event][dataset]" => "suricata.tls"
          "[network][protocol]" => "tls"
        }
      }
    }

    # -------------------------
    # Nettoyage des champs inutiles
    # -------------------------
    mutate {
      remove_field => [
        "host",
        "path",
        "message",
        "agent",
        "ecs",
        "input",
        "@version"
      ]
    }
  }
}

# -----------------------------------------------------------------------------
# OUTPUT — Envoi vers Elasticsearch
# -----------------------------------------------------------------------------
output {

  if [type] == "SuricataIDPS" {

    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      # Index dynamique par type d'événement et par date
      index => "suricata-%{[event_type]}-%{+YYYY.MM.dd}"
      # Template mapping personnalisé
      template_name => "suricata"
      template => "/etc/logstash/templates/suricata-template.json"
      template_overwrite => false
      # Authentification (si X-Pack activé)
      # user => "logstash_internal"
      # password => "${LOGSTASH_PASSWORD}"
    }

    # Debug local (désactiver en production)
    # stdout {
    #   codec => rubydebug
    # }
  }
}
